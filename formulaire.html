<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Formulaire CV - FlowCV</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/validation.js"></script>
<script src="assets/js/localStorage.js"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<h1>FlowCV - Formulaire</h1>

<form id="cvForm">

    <section>
        <h2>Informations personnelles</h2>
        <input type="text" id="prenom" placeholder="Prénom" required><br>
        <input type="text" id="nom" placeholder="Nom" required><br>
        <input type="text" id="titre" placeholder="Titre professionnel (ex: Développeur Web)" required><br>
        <input type="text" id="email" placeholder="Email" required><span id="emailError" class="error"></span> <br>
        <input type="text" id="telephone" placeholder="Téléphone" required><span id="telError" class="error"></span> <br>
        <input type="text" id="adresse" placeholder="Adresse" required><br>
        <input type="text" id="date" placeholder="Date et Lieu de Naissance" required><br>
        <input type="text" id="nationalité" placeholder="Nationalité" required><br>
        <!-- Photo -->
        <input type="file" id="photoInput" accept="image/*">
    </section>

    <section>
        <h2>Résumé professionnel</h2>
        <textarea id="resume" placeholder="Décrivez votre profil professionnel..." rows="4"></textarea>
    </section>

    <section>
        <h2>Parcours Académiques</h2>
        <input type="text" id="parcoursInput" placeholder="Ajouter un parcours académique">
        <button type="button" id="addParcours">Ajouter</button>
        <ol id="parcoursList"></ol>
    </section>

    <section>
        <h2>Expériences Professionnelles</h2>
        <input type="text" id="experienceInput" placeholder="Ajouter une expérience">
        <button type="button" id="addExperience">Ajouter</button>
        <ol id="experienceList"></ol>
    </section>

    <section>
        <h2>Compétences</h2>
        <input type="text" id="competenceInput" placeholder="Ajouter une compétence">
        <button type="button" id="addCompetence">Ajouter</button>
        <ol id="competenceList"></ol>
    </section>

    <section>
        <h2>Langues</h2>
        <input type="text" id="langueInput" placeholder="Ajouter une langue">
        <button type="button" id="addLangue">Ajouter</button>
        <ol id="langueList"></ol>
    </section>

    <section>
        <h2>Qualités</h2>
        <input type="text" id="qualiteInput" placeholder="Ajouter une qualité">
        <button type="button" id="addQualite">Ajouter</button>
        <ol id="qualiteList"></ol>
    </section>
    
    <section>
        <h2>Centres d'intérêts</h2>
        <input type="text" id="centreInput" placeholder="Ajouter un centre d'intérêt">
        <button type="button" id="addCentre">Ajouter</button>
        <ol id="centreList"></ol>
    </section>

    <section id="templates">
        <h2>Choisissez un modèle de CV</h2>
        <button type="button" class="templateCard" data-template="moderne" style="color: black; font-size: 18px; padding: 16px;">Modèle Moderne</button>
        <button type="button" class="templateCard" data-template="minimal" style="color: black; font-size: 18px; padding: 16px;">Modèle Minimal</button>
        <button type="button" class="templateCard" data-template="elegant" style="color: black; font-size: 18px; padding: 16px;">Modèle Élégant</button>
    </section>

    <button type="submit" name="btnlogin">Générer CV</button>

</form>

</body>
</html>
