<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV - FlowCV</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
padding:40px;
}

.cv{
width:210mm;
min-height:297mm;
margin:auto;
background:white;
box-sizing:border-box;
padding:20mm;
overflow: hidden;
}

#cvContainer{
width:100%;
max-width:950px;
}

button#exportPDF{
margin-top:30px;
padding:12px 25px;
background:#8E1B2F;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button#logoutBtn{
margin-top:30px;
padding:12px 25px;
background:#1B3A57;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}


.cv.modern{
display:flex;
background:white;
box-shadow:0 10px 30px rgba(162, 42, 42, 0.2);
}

.cv.modern .left{
width:47%;
background:#1B3A57;
color:white;
padding:30px;
}


.cv.modern img{
width:150px;
height:170px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:4px solid white;
}

.cv.modern .right{
width:65%;
padding:30px;
background:#f9fbfd;
}

.cv.modern h2{
border-bottom:2px solid #4DA1D8;
padding-bottom:5px;
margin-top:20px;
}

.cv.minimal{
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.cv.minimal .header{
background:#d9c4bd;
display:flex;
align-items:center;
padding:25px;
}

.cv.minimal .header img{
width:120px;
height:120px;
margin-right:20px;
object-fit:cover;
}

.cv.minimal .content{
display:flex;
}

.cv.minimal .left{
width:35%;
background:#f2f2f2;
padding:20px;
}

.cv.minimal .right{
width:65%;
padding:20px;
}

.cv.minimal h2{
background:black;
color:white;
padding:5px;
font-size:14px;
}

.cv.elegant{
background:white;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.cv.elegant .header{
background:#e6d6be;
display:flex;
align-items:center;
padding:30px;
}

.cv.elegant .header img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-right:25px;
border:5px solid #d4b483;
}

.cv.elegant .main{
display:flex;
}

.cv.elegant .left{
width:35%;
background:#d9b985;
padding:25px;
}

.cv.elegant .right{
width:65%;
padding:30px;
background:#f5f5f5;
}

.skill{
margin-bottom:10px;
list-style:none;
}

.skill-bar{
height:6px;
background:#ddd;
border-radius:5px;
margin-top:4px;
}

.skill-level{
height:6px;
background:#3498db;
width:70%;
border-radius:5px;
}

.info-item{
margin:5px 0;
}

</style>
</head>

<body>

<div id="cvContainer"></div>

<div id="cvActions" style="text-align:center; margin-top:30px;">
    <button id="exportPDF" style="font-size: 16px; margin-right:10px;">Exporter en PDF</button>
    <button id="logoutBtn" style="font-size: 16px;">Déconnexion</button>
</div>


<script src="assets/js/template.js"></script>
<script>
    document.getElementById("logoutBtn").addEventListener("click", function() {
        window.location.href = "index.html"; // redirige vers la page d'accueil
    });
</script>

</body>
</html>
