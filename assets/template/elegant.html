<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CV Elegant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>

    body{
    font-family: Georgia, serif;
    background:#eef1f5;
    display:flex;
    justify-content:center;
    padding:40px;
    }

    .cv{
    width:750px;
    background:white;
    padding:50px;
    border-radius:8px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    }

    h1{
    text-align:center;
    font-size:36px;
    margin-bottom:10px;
    }

    .info{
    text-align:center;
    color:#666;
    margin-bottom:30px;
    }

    h2{
    color:#2c3e50;
    margin-top:25px;
    border-left:4px solid #3498db;
    padding-left:10px;
    }

    p{
    line-height:1.8;
    color:#333;
    }

    button{
    margin-top:30px;
    padding:12px 25px;
    background:#2c3e50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    }

    button:hover{
    background:#1a252f;
    }

    </style>

</head>

<body>

    <div>

    <div class="cv" id="cv">

    <h1 contenteditable="true">Nom Prénom</h1>

    <div class="info" contenteditable="true">
    email@email.com | téléphone | ville
    </div>

    <h2>Profil</h2>

    <p contenteditable="true">
    Présentez votre profil professionnel
    </p>

    <h2>Expérience</h2>

    <p contenteditable="true">
    Entreprise - Poste - Date
    </p>

    <p contenteditable="true">
    Description de votre expérience
    </p>

    <h2>Formation</h2>

    <p contenteditable="true">
    Université / Diplôme
    </p>

    <h2>Compétences</h2>

    <p contenteditable="true">
    HTML, CSS, JavaScript, React
    </p>

    </div>

    <center>
    <button onclick="generatePDF()">Exporter en PDF</button>
    </center>

    </div>

    <script>

    function generatePDF(){

    const element = document.getElementById("cv");

    const opt = {
    margin:0,
    filename:'cv-elegant.pdf',
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    };

    html2pdf().set(opt).from(element).save();

    }

    </script>

</body>
</html>
