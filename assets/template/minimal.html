<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CV Minimal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>

    body{
    font-family: Helvetica, sans-serif;
    background:#f8f8f8;
    display:flex;
    justify-content:center;
    padding:40px;
    }

    .cv{
    width:700px;
    background:white;
    padding:40px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h1{
    font-size:34px;
    margin-bottom:5px;
    }

    h2{
    margin-top:25px;
    border-bottom:1px solid #ddd;
    padding-bottom:5px;
    }

    p{
    line-height:1.7;
    color:#444;
    }

    button{
    margin-top:30px;
    padding:12px 25px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:4px;
    }

    button:hover{
    background:#333;
    }

    </style>

</head>

<body>

    <div>

    <div class="cv" id="cv">

    <h1 contenteditable="true">Nom Prénom</h1>

    <p contenteditable="true">
    email@email.com | téléphone | ville
    </p>

    <h2>Profil</h2>

    <p contenteditable="true">
    Présentation courte de votre profil professionnel
    </p>

    <h2>Expérience</h2>

    <p contenteditable="true">
    Entreprise - Poste - Date
    </p>

    <p contenteditable="true">
    Description de l'expérience
    </p>

    <h2>Formation</h2>

    <p contenteditable="true">
    Université / Diplôme
    </p>

    <h2>Compétences</h2>

    <p contenteditable="true">
    HTML • CSS • JavaScript • Python
    </p>

    </div>

    <center>
    <button onclick="generatePDF()">Exporter en PDF</button>
    </center>

    </div>

    <script>

    function generatePDF(){

    const element = document.getElementById("cv");

    const opt = {
    margin:0,
    filename:'cv-minimal.pdf',
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    };

    html2pdf().set(opt).from(element).save();

    }

    </script>

</body>
</html>
