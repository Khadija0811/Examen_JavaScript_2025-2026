<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CV Moderne</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>

    body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    padding:40px;
    }

    .cv{
    width:800px;
    background:white;
    display:flex;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .left{
    width:35%;
    background:#2c3e50;
    color:white;
    padding:30px;
    }

    .right{
    width:65%;
    padding:30px;
    }

    h1{
    margin-bottom:10px;
    }

    h2{
    border-bottom:2px solid #3498db;
    padding-bottom:5px;
    margin-top:20px;
    }

    p{
    line-height:1.6;
    }

    button{
    margin-top:20px;
    padding:12px 25px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    }

    button:hover{
    background:#2980b9;
    }

    </style>

</head>

<body>

<div>

    <div class="cv" id="cv">

    <div class="left">

    <h1 contenteditable="true">Nom Prénom</h1>

    <p contenteditable="true">email@email.com</p>
    <p contenteditable="true">Téléphone</p>
    <p contenteditable="true">Adresse</p>

    <h2>Compétences</h2>

    <p contenteditable="true">HTML</p>
    <p contenteditable="true">CSS</p>
    <p contenteditable="true">JavaScript</p>

    </div>

    <div class="right">

    <h2>Profil</h2>

    <p contenteditable="true">
    Décrivez votre profil professionnel
    </p>

    <h2>Expérience</h2>

    <p contenteditable="true">
    Entreprise - Poste - Date
    </p>

    <h2>Formation</h2>

    <p contenteditable="true">
    Université / Diplôme
    </p>

    </div>

    </div>

    <center>
    <button onclick="generatePDF()">Exporter en PDF</button>
    </center>

</div>

    <script>

    function generatePDF(){

    const element = document.getElementById("cv");

    const opt = {
    margin:0,
    filename:'mon-cv.pdf',
    image:{type:'jpeg',quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    };

    html2pdf().set(opt).from(element).save();

    }

    </script>

</body>
</html>
